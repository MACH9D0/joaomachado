<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>João Machado | Cyber Portfolio</title>
    
    <!-- Fonts: Fira Code (Monospace) and Inter (Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cyber: {
                bg: '#0b0c10',
                dark: '#1f2833',
                text: '#c5c6c7',
                neon: '#66fcf1',
                dim: '#45a29e',
              }
            },
            fontFamily: {
              mono: ['"Fira Code"', 'monospace'],
              sans: ['"Inter"', 'sans-serif'],
            },
            animation: {
              'blink': 'blink 1s step-end infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'neon-pulse': 'neonPulse 2s ease-in-out infinite alternate',
            },
            keyframes: {
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              neonPulse: {
                '0%': { 
                  textShadow: '0 0 4px rgba(102, 252, 241, 0.1), 0 0 11px rgba(102, 252, 241, 0.1)' 
                },
                '100%': { 
                  textShadow: '0 0 4px rgba(102, 252, 241, 0.5), 0 0 11px rgba(102, 252, 241, 0.5), 0 0 19px rgba(102, 252, 241, 0.5)' 
                }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0b0c10;
        color: #c5c6c7;
        margin: 0;
        overflow-x: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0b0c10;
      }
      ::-webkit-scrollbar-thumb {
        background: #45a29e;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #66fcf1;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
